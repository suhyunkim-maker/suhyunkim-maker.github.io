<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Pages Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1><a href="index.html">My Blog</a></h1>
      <nav>
        <button id="theme-toggle">🌓</button>
      </nav>
    </div>
  </header>
  
  <main>
    <section class="portfolio-section">
      <h2 style="margin-bottom: 1rem;">🚀 주요 프로젝트</h2>
      <div class="project-grid">
        <a href="post.html?file=instagram-analysis.md" class="project-card">
          <h3>메인 인스타그램 인플루언서에 대한 데이터 분석</h3>
          <p class="project-desc">인스타그램 인플루언서 데이터를 수집하고 분석하여 유의미한 인사이트를 도출하는 프로젝트입니다.</p>
          <div class="project-tags">
            <span class="tag">Pandas</span>
            <span class="tag">Google Colab</span>
            <span class="tag">Data Analysis</span>
          </div>
        </a>
      </div>
    </section>

    <hr style="margin: 2rem 0; border: none; border-top: 1px solid var(--border-color);">

    <div class="search-container">
      <input type="text" id="search-input" placeholder="검색어를 입력하세요...">
    </div>
    
    <div class="tag-filter-container">
      <ul id="tag-filters"></ul>
    </div>

    <section id="post-list" class="post-list">
      <!-- 게시글 목록이 여기에 동적으로 렌더링됩니다 -->
    </section>
  </main>

  <footer>
    <p>&copy; 2025 My Blog. Powered by GitHub Pages.</p>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
